name: SEO Autopilot

on:
  schedule:
    # ─────────────────────────────────────────────────────────────
    #  POSTING FREQUENCY — uncomment ONE line, comment out the rest
    #  Use https://crontab.guru to build a custom schedule
    # ─────────────────────────────────────────────────────────────

    - cron: "0 8 * * *"       # Daily at 8am UTC
    # - cron: "0 8 * * 1"         # Weekly — every Monday at 8am UTC
    # - cron: "0 8 * * 1,4"     # Twice a week — Monday + Thursday
    # - cron: "0 8 1,15 * *"    # Twice a month — 1st and 15th
    # - cron: "0 8 1 * *"       # Monthly — 1st of each month

  workflow_dispatch:
    inputs:
      topic_override:
        description: "Optional: run with this specific topic instead of the queue"
        required: false
        default: ""

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run pipeline
        env:
          WP_URL:              ${{ secrets.WP_URL }}
          WP_USER:             ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          DATAFORSEO_USER:     ${{ secrets.DATAFORSEO_USER }}
          DATAFORSEO_PASS:     ${{ secrets.DATAFORSEO_PASS }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PINTEREST_TOKEN:     ${{ secrets.PINTEREST_TOKEN }}
          PINTEREST_BOARD_ID:  ${{ secrets.PINTEREST_BOARD_ID }}
          TOPIC_OVERRIDE:      ${{ github.event.inputs.topic_override }}
        run: node src/pipeline.js

      - name: Commit state.json
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "chore: pipeline run $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          # Pull with rebase before pushing to handle concurrent runs
          git pull --rebase origin main || true
          git push
